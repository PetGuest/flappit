<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Flappit · Administración</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  :root{--bg:#0a0a0c; --panel:#131316; --line:#26262b; --accent:#d7e021; --text:#f4f4f0; --muted:#9a9aa2;
    --ink:#0a0a0c; --green:#3dff6e; --yellow:#ffd400; --red:#ff5c5c;}
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--text); line-height:1.5;
    font-family:-apple-system,"SF Pro Text","Inter",system-ui,sans-serif;}
  .wrap{max-width:1120px; margin:0 auto; padding:22px 20px 80px;}
  header{display:flex; align-items:center; gap:14px; margin-bottom:22px; flex-wrap:wrap;}
  .logo{display:flex; align-items:center; gap:9px;}
  .logo img{height:34px; display:block;}
  .logo span{color:var(--accent); font-size:11px; font-weight:800; letter-spacing:2px; font-family:ui-monospace,monospace;}
  h1{font-size:17px; margin:0; font-weight:700;}
  .sub{color:var(--muted); font-size:13px;}
  .spacer{margin-left:auto;}
  button.refresh{background:var(--accent); color:var(--ink); border:none; border-radius:9px;
    padding:9px 16px; font-weight:800; cursor:pointer; font-family:ui-monospace,monospace; font-size:13px;}
  button.refresh:active{transform:translateY(1px);}
  .cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:22px;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:13px; padding:15px 16px;}
  .card .k{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.6px;}
  .card .v{font-size:26px; font-weight:800; margin-top:4px; font-family:ui-monospace,monospace;}
  .card .v.accent{color:var(--accent);}
  .tableBox{background:var(--panel); border:1px solid var(--line); border-radius:13px; overflow:hidden;}
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th,td{text-align:left; padding:11px 14px; border-bottom:1px solid var(--line); white-space:nowrap;}
  th{font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); font-weight:700;
    position:sticky; top:0; background:#17171b;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:rgba(255,255,255,0.02);}
  td.email{font-family:ui-monospace,monospace; font-size:12.5px;}
  td.wrap-ok{white-space:normal;}
  .pill{display:inline-block; padding:2px 9px; border-radius:999px; font-size:11.5px; font-weight:700;
    font-family:ui-monospace,monospace;}
  .pill.green{background:rgba(61,255,110,.14); color:var(--green);}
  .pill.yellow{background:rgba(255,212,0,.14); color:var(--yellow);}
  .pill.red{background:rgba(255,92,92,.16); color:var(--red);}
  .pill.plan{background:rgba(215,224,33,.14); color:var(--accent);}
  button.act{background:#1d1d22; color:var(--text); border:1px solid var(--line); border-radius:8px;
    padding:5px 10px; font-size:12px; cursor:pointer; font-family:ui-monospace,monospace; margin-right:6px;}
  button.act:hover{border-color:var(--accent); color:var(--accent);}
  button.act.danger:hover{border-color:var(--red); color:var(--red);}
  tr.detail td{background:#0f0f12; white-space:normal; padding:14px 16px;}
  .tempPw{font-family:ui-monospace,monospace; font-size:16px; font-weight:800; color:var(--accent);
    background:#000; border:1px dashed var(--accent); border-radius:8px; padding:6px 12px;
    display:inline-block; letter-spacing:1px; user-select:all;}
  .detail .note{color:var(--muted); font-size:12px; margin-top:8px;}
  .scrRow{display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px dashed var(--line);}
  .scrRow:last-of-type{border-bottom:none;}
  .dot{width:8px; height:8px; border-radius:50%; display:inline-block;}
  .dot.on{background:var(--green);} .dot.off{background:#555;}
  .msg{background:var(--panel); border:1px solid var(--line); border-radius:13px; padding:34px 26px;
    text-align:center; color:var(--muted);}
  .msg h2{color:var(--text); margin:0 0 8px; font-size:18px;}
  .msg a{color:var(--accent); text-decoration:none; font-weight:700;}
  .foot{color:var(--muted); font-size:12px; margin-top:14px;}
  .login{max-width:360px; margin:6vh auto 0; background:var(--panel); border:1px solid var(--line);
    border-radius:14px; padding:26px 24px;}
  .login h2{margin:0 0 4px; font-size:19px;}
  .login p{color:var(--muted); font-size:13px; margin:0 0 10px;}
  .login label{display:block; font-size:12px; color:var(--muted); margin:12px 0 5px;}
  .login input{width:100%; background:#0a0c05; color:var(--text); border:1px solid var(--line);
    border-radius:9px; padding:11px 12px; font-size:14px; font-family:inherit;}
  .login input:focus{outline:none; border-color:var(--accent);}
  .pwWrap{position:relative;}
  .pwWrap input{padding-right:44px;}
  .eye{position:absolute; right:6px; top:50%; transform:translateY(-50%); background:none; border:none;
    color:var(--muted); cursor:pointer; padding:6px; display:flex; align-items:center;}
  .eye:hover{color:var(--text);}
  .login .go{width:100%; margin-top:18px; background:var(--accent); color:var(--ink); border:none;
    border-radius:9px; padding:12px; font-weight:800; cursor:pointer; font-size:14px; font-family:ui-monospace,monospace;}
  .login .go:disabled{opacity:.6; cursor:default;}
  .login .err{color:var(--red); font-size:13px; margin-top:12px; min-height:16px;}
  .login .note{color:var(--muted); font-size:12px; margin-top:14px; text-align:center;}
  @media(max-width:640px){ th,td{padding:9px 10px;} .colHide{display:none;} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo"><img src="/flappit-logo.svg?v=2" alt="Flappit"> <span>ADMIN</span></div>
    <div>
      <h1>Panel de administración</h1>
      <div class="sub" id="whoami"></div>
    </div>
    <div class="spacer"></div>
    <button class="refresh" id="refreshBtn" style="display:none;">Actualizar</button>
  </header>

  <div id="content"></div>
</div>

<script>
"use strict";
const $ = (id)=>document.getElementById(id);
const content = $("content");

function fmtDate(ms){
  if(!ms) return "—";
  const d = new Date(Number(ms));
  if(isNaN(d)) return "—";
  return d.toLocaleDateString("es-ES", {day:"2-digit", month:"2-digit", year:"numeric"});
}
function planName(p){ return p==="uno" ? "1 pantalla" : p==="tres" ? "3 pantallas" : p==="cadena" ? "Cadenas" : (p||"—"); }

// estado legible + color a partir de la suscripción
function statusPill(u){
  const s = (u.sub_status||"").toLowerCase();
  if(s==="active" || s==="trialing") return '<span class="pill green">Activo</span>';
  if(u.entitled && s==="trial")       return '<span class="pill yellow">En prueba</span>';
  if(!u.entitled)                     return '<span class="pill red">Prueba caducada</span>';
  return '<span class="pill">'+ (u.sub_status||"—") +'</span>';
}
// fecha relevante segun estado
function whenCol(u){
  const s = (u.sub_status||"").toLowerCase();
  if(s==="active" || s==="trialing") return u.current_period_end ? "Renueva "+fmtDate(u.current_period_end) : "Activa";
  if(u.entitled && s==="trial")       return "Prueba hasta "+fmtDate(u.trial_until);
  if(!u.entitled)                     return "Caducó "+fmtDate(u.trial_until);
  return "—";
}

function showMessage(html){ content.innerHTML = '<div class="msg">'+html+'</div>'; }

function eyeIcon(showing){
  return showing
    ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"/><path d="M10.6 10.6a3 3 0 0 0 4.2 4.2"/><path d="M9.9 4.6A9.6 9.6 0 0 1 12 5c6.5 0 10 7 10 7a17 17 0 0 1-3.3 4M6.1 6.1A17 17 0 0 0 2 12s3.5 7 10 7a9.6 9.6 0 0 0 3.9-.8"/></svg>'
    : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>';
}
function showLogin(){
  $("refreshBtn").style.display = "none";
  content.innerHTML =
      '<div class="login">'
    + '<h2>Acceso administración</h2>'
    + '<p>Panel privado. Entra con tu cuenta.</p>'
    + '<label>Email</label>'
    + '<input id="lEmail" type="email" autocomplete="username" placeholder="tu@email.com">'
    + '<label>Contraseña</label>'
    + '<div class="pwWrap"><input id="lPass" type="password" autocomplete="current-password" placeholder="Tu contraseña">'
    + '<button class="eye" id="lEye" type="button" title="Mostrar u ocultar la contraseña">'+eyeIcon(false)+'</button></div>'
    + '<button class="go" id="lGo">Entrar</button>'
    + '<div class="err" id="lErr"></div>'
    + '<div class="note">La sesión se mantendrá iniciada 30 días.</div>'
    + '</div>';
  let shown = false;
  $("lEye").addEventListener("click", ()=>{
    shown = !shown;
    $("lPass").type = shown ? "text" : "password";
    $("lEye").innerHTML = eyeIcon(shown);
    $("lPass").focus();
  });
  const submit = async ()=>{
    const email = $("lEmail").value.trim(), password = $("lPass").value;
    if(!email || !password){ $("lErr").textContent = "Introduce email y contraseña."; return; }
    $("lGo").disabled = true; $("lErr").textContent = "";
    try{
      const r = await fetch("/api/login", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({email,password})});
      if(!r.ok){ $("lErr").textContent = "Email o contraseña incorrectos."; $("lGo").disabled = false; return; }
      load(); // sesión iniciada (30 días) → carga el panel
    }catch(e){ $("lErr").textContent = "Sin conexión."; $("lGo").disabled = false; }
  };
  $("lGo").addEventListener("click", submit);
  $("lPass").addEventListener("keydown", e=>{ if(e.key==="Enter") submit(); });
  $("lEmail").addEventListener("keydown", e=>{ if(e.key==="Enter") $("lPass").focus(); });
}

function render(users){
  const total = users.length;
  const activos = users.filter(u=>{ const s=(u.sub_status||"").toLowerCase(); return s==="active"||s==="trialing"; }).length;
  const prueba  = users.filter(u=> u.entitled && (u.sub_status||"").toLowerCase()==="trial").length;
  const caduca  = users.filter(u=> !u.entitled).length;
  const pantallas = users.reduce((a,u)=> a + (u.screens||0), 0);

  let html = '<div class="cards">'
    + card("Usuarios", total)
    + card("Suscripción activa", activos, true)
    + card("En prueba", prueba)
    + card("Prueba caducada", caduca)
    + card("Pantallas totales", pantallas)
    + '</div>';

  if(!total){
    html += '<div class="msg"><h2>Aún no hay usuarios registrados</h2>'
      + '<div>Cuando alguien cree una cuenta, aparecerá aquí.</div></div>';
    content.innerHTML = html; return;
  }

  html += '<div class="tableBox"><table><thead><tr>'
    + '<th>Email</th><th>Negocio</th><th>Plan</th><th>Estado</th>'
    + '<th class="colHide">Suscripción</th><th>Pantallas</th><th class="colHide">Alta</th>'
    + '<th>Acciones</th>'
    + '</tr></thead><tbody>';
  for(const u of users){
    html += '<tr id="u'+u.id+'">'
      + '<td class="email">'+esc(u.email)+'</td>'
      + '<td class="wrap-ok">'+esc(u.business||"—")+'</td>'
      + '<td><span class="pill plan">'+planName(u.plan)+'</span></td>'
      + '<td>'+statusPill(u)+'</td>'
      + '<td class="colHide">'+esc(whenCol(u))+'</td>'
      + '<td>'+(u.screens||0)+' / '+(u.screens_limit||1)+'</td>'
      + '<td class="colHide">'+fmtDate(u.created)+'</td>'
      + '<td><button class="act" data-pw="'+u.id+'" data-mail="'+esc(u.email)+'">Contraseña</button>'
      + '<button class="act" data-scr="'+u.id+'">Pantallas</button></td>'
      + '</tr>';
  }
  html += '</tbody></table></div>';
  html += '<div class="foot">Actualizado: '+ new Date().toLocaleString("es-ES") +'</div>';
  content.innerHTML = html;
}
function card(k,v,accent){ return '<div class="card"><div class="k">'+k+'</div><div class="v'+(accent?" accent":"")+'">'+v+'</div></div>'; }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ---- acciones por usuario: contraseña temporal y pantallas ---- */
const COLS = 8; // columnas de la tabla (para el colspan de la fila de detalle)

function detailRow(uid){ // devuelve (creándola si hace falta) la fila de detalle bajo el usuario
  let tr = document.getElementById("d"+uid);
  if(tr) return tr;
  tr = document.createElement("tr");
  tr.className = "detail"; tr.id = "d"+uid;
  tr.innerHTML = '<td colspan="'+COLS+'"></td>';
  const anchor = document.getElementById("u"+uid);
  anchor.parentNode.insertBefore(tr, anchor.nextSibling);
  return tr;
}
function closeDetail(uid){ const tr = document.getElementById("d"+uid); if(tr) tr.remove(); }

async function resetPw(uid, email){
  if(!confirm("Generar una contraseña temporal para "+email+"?\nLa actual dejará de funcionar.")) return;
  const td = detailRow(uid).firstChild;
  td.innerHTML = "Generando…";
  try{
    const r = await fetch("/api/admin/users/"+uid+"/reset-password", {method:"POST"});
    if(!r.ok) throw new Error(r.status);
    const d = await r.json();
    td.innerHTML = 'Contraseña temporal de <b>'+esc(d.email)+'</b>: '
      + '<span class="tempPw" id="pw'+uid+'">'+esc(d.password)+'</span> '
      + '<button class="act" data-copy="'+uid+'">Copiar</button>'
      + '<button class="act" data-close="'+uid+'">Cerrar</button>'
      + '<div class="note">Se muestra solo esta vez. Pásasela al cliente y recomiéndale cambiarla desde un ordenador suyo (enlace "¿Olvidó su contraseña?" del panel).</div>';
  }catch(e){ td.innerHTML = 'Error al generar la contraseña. <button class="act" data-close="'+uid+'">Cerrar</button>'; }
}

async function showScreens(uid){
  const existing = document.getElementById("d"+uid);
  if(existing && existing.dataset.kind==="scr"){ existing.remove(); return; } // toggle
  const tr = detailRow(uid); tr.dataset.kind = "scr";
  const td = tr.firstChild;
  td.innerHTML = "Cargando pantallas…";
  try{
    const r = await fetch("/api/admin/users/"+uid+"/screens");
    if(!r.ok) throw new Error(r.status);
    const list = await r.json();
    if(!list.length){ td.innerHTML = 'Esta cuenta no tiene pantallas vinculadas. <button class="act" data-close="'+uid+'">Cerrar</button>'; return; }
    let h = "";
    for(const s of list){
      h += '<div class="scrRow"><span class="dot '+(s.online?"on":"off")+'"></span>'
        + '<b>'+esc(s.name)+'</b>'
        + '<span style="color:var(--muted); font-size:12px;">'
        + (s.online ? "conectada ahora" : "última señal: "+fmtDate(s.last_seen)) + '</span>'
        + '<button class="act danger" style="margin-left:auto;" data-unpair="'+s.id+'" data-uid="'+uid+'">Desvincular</button>'
        + '</div>';
    }
    h += '<div class="note">Al desvincular, la TV borra su vínculo y muestra al momento un código nuevo de 4 letras para volver a emparejarla desde el panel del cliente.</div>'
      + '<button class="act" data-close="'+uid+'" style="margin-top:8px;">Cerrar</button>';
    td.innerHTML = h;
  }catch(e){ td.innerHTML = 'Error al cargar las pantallas. <button class="act" data-close="'+uid+'">Cerrar</button>'; }
}

async function unpairScreen(sid, uid){
  if(!confirm("¿Desvincular esta pantalla? La TV pasará a mostrar un código de emparejamiento nuevo.")) return;
  try{
    const r = await fetch("/api/admin/screens/"+sid, {method:"DELETE"});
    if(!r.ok) throw new Error(r.status);
    closeDetail(uid);
    await showScreens(uid); // recarga la lista
  }catch(e){ alert("No se pudo desvincular (error "+e.message+")."); }
}

content.addEventListener("click", (e)=>{
  const b = e.target.closest("button"); if(!b) return;
  if(b.dataset.pw)     resetPw(+b.dataset.pw, b.dataset.mail);
  else if(b.dataset.scr)    showScreens(+b.dataset.scr);
  else if(b.dataset.unpair) unpairScreen(+b.dataset.unpair, +b.dataset.uid);
  else if(b.dataset.copy){
    const el = document.getElementById("pw"+b.dataset.copy);
    if(el) navigator.clipboard && navigator.clipboard.writeText(el.textContent)
      .then(()=>{ b.textContent = "Copiada ✓"; setTimeout(()=>b.textContent="Copiar", 1500); });
  }
  else if(b.dataset.close)  closeDetail(+b.dataset.close);
});

async function load(){
  content.innerHTML = '<div class="msg">Cargando…</div>';
  let me;
  try{ me = await fetch("/api/me", {headers:{Accept:"application/json"}}); }
  catch(e){ showMessage('<h2>Sin conexión</h2><div>No se pudo contactar con el servidor.</div>'); return; }

  if(me.status===401){ showLogin(); return; }
  const meData = await me.json().catch(()=>({}));
  $("whoami").textContent = meData.email ? ("Conectado como "+meData.email) : "";
  if(!meData.is_admin){
    $("refreshBtn").style.display = "none";
    showMessage('<h2>Acceso no autorizado</h2><div>Tu cuenta no tiene permiso de administrador.</div>');
    return;
  }

  const r = await fetch("/api/admin/users", {headers:{Accept:"application/json"}});
  if(!r.ok){ showMessage('<h2>No se pudo cargar</h2><div>Error '+r.status+'.</div>'); return; }
  const data = await r.json();
  $("refreshBtn").style.display = "";
  render(data.users || []);
}

$("refreshBtn").addEventListener("click", load);
load();
</script>
</body>
</html>
